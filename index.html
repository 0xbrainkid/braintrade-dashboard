<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>brainTrade — Live Trading Dashboard</title>
<meta http-equiv="refresh" content="60">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --border: #1e1e2e;
    --text: #e0e0e0;
    --dim: #6b7280;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #3b82f6;
    --yellow: #eab308;
    --purple: #a855f7;
    --cyan: #06b6d4;
    --orange: #f97316;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .header h1 { font-size: 1.4em; }
  .header .live { color: var(--green); font-size: 0.8em; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  .header .updated { color: var(--dim); font-size: 0.75em; }
  
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .card-title { color: var(--dim); font-size: 0.7em; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .card-value { font-size: 1.8em; font-weight: 700; }
  .card-sub { color: var(--dim); font-size: 0.75em; margin-top: 4px; }
  .green { color: var(--green); }
  .red { color: var(--red); }
  .blue { color: var(--blue); }
  .yellow { color: var(--yellow); }
  .purple { color: var(--purple); }
  .cyan { color: var(--cyan); }
  .orange { color: var(--orange); }

  .section-title { 
    font-size: 0.85em; font-weight: 600; color: var(--dim); 
    margin: 24px 0 10px; text-transform: uppercase; letter-spacing: 1px;
    border-bottom: 1px solid var(--border); padding-bottom: 6px;
  }
  
  table { width: 100%; border-collapse: collapse; font-size: 0.8em; }
  th { text-align: left; color: var(--dim); padding: 8px; font-weight: 500; border-bottom: 1px solid var(--border); }
  td { padding: 8px; border-bottom: 1px solid var(--border); }
  
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .status-dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.off { background: var(--red); }

  .chart-bar { height: 24px; border-radius: 3px; margin: 2px 0; min-width: 2px; display: inline-block; vertical-align: middle; }
  .chart-row { display: flex; align-items: center; gap: 8px; margin: 3px 0; font-size: 0.75em; }
  .chart-label { width: 45px; color: var(--dim); text-align: right; }
  .chart-val { width: 60px; font-weight: 600; }

  .pillar { margin-bottom: 20px; }
  .pillar-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .pillar-title { font-size: 0.9em; font-weight: 700; }
  .pillar-pct { font-size: 1.1em; font-weight: 700; }
  .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 12px; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }

  .insight { 
    background: #0d1117; border-left: 3px solid var(--cyan); 
    padding: 8px 12px; margin: 6px 0; font-size: 0.75em; border-radius: 0 4px 4px 0;
  }
  .insight .label { color: var(--cyan); font-weight: 600; font-size: 0.85em; }
  .insight .detail { color: var(--dim); margin-top: 2px; }

  .evolution-item {
    display: flex; gap: 8px; align-items: flex-start; margin: 4px 0; font-size: 0.75em;
  }
  .evo-date { color: var(--dim); min-width: 50px; }
  .evo-text { flex: 1; }
  .evo-impact { font-weight: 600; min-width: 60px; text-align: right; }

  .tabs { display: flex; gap: 4px; margin-bottom: 12px; }
  .tab { 
    padding: 6px 14px; border-radius: 4px; font-size: 0.75em; cursor: pointer;
    background: var(--card); border: 1px solid var(--border); color: var(--dim);
  }
  .tab.active { background: var(--border); color: var(--text); border-color: var(--blue); }

  .metric-row {
    display: flex; justify-content: space-between; padding: 6px 0;
    border-bottom: 1px solid var(--border); font-size: 0.8em;
  }
  .metric-label { color: var(--dim); }
  .metric-value { font-weight: 600; }

  .copy-signal {
    display: inline-block; padding: 2px 8px; border-radius: 3px;
    font-size: 0.7em; font-weight: 600; margin: 2px;
  }
  .signal-bullish { background: rgba(34,197,94,0.15); color: var(--green); }
  .signal-bearish { background: rgba(239,68,68,0.15); color: var(--red); }
  .signal-neutral { background: rgba(107,114,128,0.15); color: var(--dim); }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📊 brainTrade</h1>
    <span style="color: var(--dim); font-size: 0.75em;">Autonomous Trading Agent — brainAI</span>
  </div>
  <div style="text-align: right;">
    <div class="live">● LIVE</div>
    <div class="updated" id="updated"></div>
  </div>
</div>

<!-- Top cards -->
<div class="grid" id="top-cards"></div>

<!-- AI Fund -->
<div class="section-title">🏦 AI Fund ($400K)</div>
<div id="ai-fund"></div>

<!-- P&L Chart -->
<div class="section-title">📈 Daily P&L</div>
<div id="pnl-chart"></div>

<!-- ═══ PILLAR 1: COPY INTELLIGENCE ═══ -->
<div class="section-title" style="color: var(--cyan);">🧠 PILLAR 1 — Copy Intelligence</div>
<div class="pillar" id="pillar1"></div>

<!-- ═══ PILLAR 2: EDGE DEVELOPMENT ═══ -->
<div class="section-title" style="color: var(--purple);">⚡ PILLAR 2 — Edge Development</div>
<div class="pillar" id="pillar2"></div>

<!-- ═══ PILLAR 3: CONTINUOUS ITERATION ═══ -->
<div class="section-title" style="color: var(--orange);">🔄 PILLAR 3 — Continuous Iteration</div>
<div class="pillar" id="pillar3"></div>

<!-- Open Positions -->
<div class="section-title">📋 Open Positions</div>
<div id="positions"></div>

<!-- Funding Opportunities -->
<div class="section-title">💰 Top Funding Rate Opportunities</div>
<div id="funding"></div>

<script>
async function loadData() {
  try {
    const resp = await fetch('data.json?' + Date.now());
    const d = await resp.json();
    
    document.getElementById('updated').textContent = new Date(d.timestamp).toLocaleString() + ' UTC';
    
    const totalBal = d.pm_balance + d.hl_balance;
    const todayClass = d.today_pnl >= 0 ? 'green' : 'red';
    const allTimeClass = d.all_time_pnl >= 0 ? 'green' : 'red';
    const winRate = d.today_wins + d.today_losses > 0 
      ? ((d.today_wins / (d.today_wins + d.today_losses)) * 100).toFixed(0) 
      : '—';
    
    document.getElementById('top-cards').innerHTML = `
      <div class="card">
        <div class="card-title">Total Capital</div>
        <div class="card-value">$${totalBal.toFixed(2)}</div>
        <div class="card-sub">PM: $${d.pm_balance.toFixed(2)} · HL: $${d.hl_balance.toFixed(2)}</div>
      </div>
      <div class="card">
        <div class="card-title">Today P&L</div>
        <div class="card-value ${todayClass}">${d.today_pnl >= 0 ? '+' : ''}$${d.today_pnl.toFixed(2)}</div>
        <div class="card-sub">PM: $${d.pm_pnl.toFixed(2)} · HL: $${d.hl_pnl.toFixed(2)}</div>
      </div>
      <div class="card">
        <div class="card-title">All-Time P&L</div>
        <div class="card-value ${allTimeClass}">${d.all_time_pnl >= 0 ? '+' : ''}$${d.all_time_pnl.toFixed(2)}</div>
        <div class="card-sub">${d.days_active} days active · ${d.total_trades} trades</div>
      </div>
      <div class="card">
        <div class="card-title">Today Stats</div>
        <div class="card-value">${winRate}%</div>
        <div class="card-sub">${d.today_wins}W / ${d.today_losses}L · ${d.today_trades} trades</div>
      </div>
    `;
    
    // AI Fund
    if (d.ai_fund && d.ai_fund.active_trades && d.ai_fund.active_trades.length) {
      let fundHtml = '<table><tr><th>Asset</th><th>Direction</th><th>Size</th><th>Entry</th><th>Current</th><th>uPnL</th></tr>';
      for (const t of d.ai_fund.active_trades) {
        const pnlClass = t.unrealized_pnl >= 0 ? 'green' : 'red';
        const pnlSign = t.unrealized_pnl >= 0 ? '+' : '';
        fundHtml += `<tr>
          <td>${t.asset}</td>
          <td style="color: ${t.direction === 'LONG' ? 'var(--green)' : 'var(--red)'}">${t.direction}</td>
          <td>${t.size}</td>
          <td>$${Number(t.entry_price).toLocaleString()}</td>
          <td>$${Number(t.current_price).toLocaleString()}</td>
          <td style="color: var(--${pnlClass})">${pnlSign}$${Number(t.unrealized_pnl).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
        </tr>`;
      }
      fundHtml += '</table>';
      document.getElementById('ai-fund').innerHTML = fundHtml;
    } else {
      document.getElementById('ai-fund').innerHTML = '<div style="color: var(--muted); padding: 10px;">No active trades</div>';
    }

    // P&L Chart
    if (d.daily_pnl && d.daily_pnl.length) {
      const maxAbs = Math.max(...d.daily_pnl.map(x => Math.abs(x.pnl)), 1);
      let chartHtml = '';
      for (const day of d.daily_pnl) {
        const pct = Math.abs(day.pnl) / maxAbs * 100;
        const color = day.pnl >= 0 ? 'var(--green)' : 'var(--red)';
        const cls = day.pnl >= 0 ? 'green' : 'red';
        chartHtml += `<div class="chart-row">
          <span class="chart-label">${day.date}</span>
          <div class="chart-bar" style="width:${Math.max(pct, 2)}%;background:${color}"></div>
          <span class="chart-val ${cls}">${day.pnl >= 0 ? '+' : ''}$${day.pnl.toFixed(0)}</span>
        </div>`;
      }
      document.getElementById('pnl-chart').innerHTML = chartHtml;
    }

    // ═══ PILLAR 1: COPY INTELLIGENCE ═══
    const p1 = d.pillar1 || {};
    const p1pct = p1.completion || 80;
    document.getElementById('pillar1').innerHTML = `
      <div class="pillar-header">
        <span class="pillar-title cyan">How well do I understand what winning traders do?</span>
        <span class="pillar-pct cyan">${p1pct}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${p1pct}%;background:var(--cyan)"></div></div>
      
      <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
        <div class="card">
          <div class="card-title">Traders Tracked</div>
          <div class="card-value cyan">${p1.traders_tracked || 0}</div>
          <div class="card-sub">Top PM wallets monitored</div>
        </div>
        <div class="card">
          <div class="card-title">Copy Signal</div>
          <div class="card-value"><span class="copy-signal ${p1.current_bias === 'bullish' ? 'signal-bullish' : p1.current_bias === 'bearish' ? 'signal-bearish' : 'signal-neutral'}">${(p1.current_bias || 'neutral').toUpperCase()}</span></div>
          <div class="card-sub">Confidence: ${p1.signal_confidence || 0}/100</div>
        </div>
        <div class="card">
          <div class="card-title">Signals Today</div>
          <div class="card-value cyan">${p1.signals_today || 0}</div>
          <div class="card-sub">Fed into trading decisions</div>
        </div>
      </div>

      <div style="margin-top: 10px;">
        <div class="card-title">📡 Latest Insights</div>
        ${(p1.insights || []).map(i => `
          <div class="insight">
            <div class="label">${i.source}</div>
            <div class="detail">${i.text}</div>
          </div>
        `).join('') || '<div class="card-sub">No insights yet — scanner collecting data</div>'}
      </div>

      <div style="margin-top: 10px;">
        <div class="card-title">🧬 Evolution Log</div>
        ${(p1.evolution || []).map(e => `
          <div class="evolution-item">
            <span class="evo-date">${e.date}</span>
            <span class="evo-text">${e.change}</span>
            <span class="evo-impact ${e.impact_class || ''}">${e.impact || ''}</span>
          </div>
        `).join('') || '<div class="card-sub">Tracking starts today</div>'}
      </div>
    `;

    // ═══ PILLAR 2: EDGE DEVELOPMENT ═══
    const p2 = d.pillar2 || {};
    const p2pct = p2.completion || 85;
    document.getElementById('pillar2').innerHTML = `
      <div class="pillar-header">
        <span class="pillar-title purple">How sharp are my trading strategies?</span>
        <span class="pillar-pct purple">${p2pct}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${p2pct}%;background:var(--purple)"></div></div>
      
      <table>
        <tr><th>Strategy</th><th>Status</th><th>Trades</th><th>Win Rate</th><th>P&L</th><th>Sharpe</th></tr>
        ${(p2.strategies || []).map(s => `
          <tr>
            <td>${s.name}</td>
            <td><span class="status-dot ${s.status === 'LIVE' ? 'on' : 'off'}"></span>${s.status}</td>
            <td>${s.trades}</td>
            <td class="${s.win_rate >= 60 ? 'green' : s.win_rate >= 50 ? 'yellow' : 'red'}">${s.win_rate}%</td>
            <td class="${s.pnl >= 0 ? 'green' : 'red'}">${s.pnl >= 0 ? '+' : ''}$${s.pnl.toFixed(2)}</td>
            <td class="${s.sharpe >= 1 ? 'green' : s.sharpe >= 0.5 ? 'yellow' : 'red'}">${s.sharpe.toFixed(2)}</td>
          </tr>
        `).join('') || '<tr><td colspan="6" class="card-sub">Loading strategies...</td></tr>'}
      </table>

      <div style="margin-top: 10px;">
        <div class="card-title">🔬 Edge Metrics Over Time</div>
        ${(p2.edge_history || []).map(e => `
          <div class="evolution-item">
            <span class="evo-date">${e.date}</span>
            <span class="evo-text">${e.change}</span>
            <span class="evo-impact ${e.impact_class || ''}">${e.impact || ''}</span>
          </div>
        `).join('') || '<div class="card-sub">Tracking starts today</div>'}
      </div>
    `;

    // ═══ PILLAR 3: CONTINUOUS ITERATION ═══
    const p3 = d.pillar3 || {};
    const p3pct = p3.completion || 70;
    document.getElementById('pillar3').innerHTML = `
      <div class="pillar-header">
        <span class="pillar-title orange">How fast am I learning and adapting?</span>
        <span class="pillar-pct orange">${p3pct}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${p3pct}%;background:var(--orange)"></div></div>
      
      <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
        <div class="card">
          <div class="card-title">Parameters Changed</div>
          <div class="card-value orange">${p3.params_changed || 0}</div>
          <div class="card-sub">Data-backed adjustments</div>
        </div>
        <div class="card">
          <div class="card-title">Research Reports</div>
          <div class="card-value orange">${p3.research_reports || 0}</div>
          <div class="card-sub">Analysis documents generated</div>
        </div>
        <div class="card">
          <div class="card-title">Heartbeats Today</div>
          <div class="card-value orange">${p3.heartbeats_today || 0}</div>
          <div class="card-sub">Active review cycles</div>
        </div>
      </div>

      <div style="margin-top: 10px;">
        <div class="card-title">🔧 Recent Changes</div>
        ${(p3.changes || []).map(c => `
          <div class="evolution-item">
            <span class="evo-date">${c.date}</span>
            <span class="evo-text"><strong>${c.param}:</strong> ${c.old} → ${c.new}</span>
            <span class="evo-impact ${c.impact_class || ''}">${c.reason || ''}</span>
          </div>
        `).join('') || '<div class="card-sub">No changes yet</div>'}
      </div>

      <div style="margin-top: 10px;">
        <div class="card-title">📊 Performance Trend</div>
        <div class="metric-row"><span class="metric-label">Win Rate (7d)</span><span class="metric-value ${(p3.win_rate_7d||0) >= 60 ? 'green' : 'yellow'}">${p3.win_rate_7d || '—'}%</span></div>
        <div class="metric-row"><span class="metric-label">Win Rate (24h)</span><span class="metric-value ${(p3.win_rate_24h||0) >= 60 ? 'green' : 'yellow'}">${p3.win_rate_24h || '—'}%</span></div>
        <div class="metric-row"><span class="metric-label">Avg Trade Size</span><span class="metric-value">$${p3.avg_trade_size || '—'}</span></div>
        <div class="metric-row"><span class="metric-label">Sharpe Ratio</span><span class="metric-value ${(p3.sharpe||0) >= 1 ? 'green' : 'yellow'}">${p3.sharpe || '—'}</span></div>
        <div class="metric-row"><span class="metric-label">Max Drawdown</span><span class="metric-value red">${p3.max_drawdown || '—'}%</span></div>
      </div>
    `;

    // Positions
    if (d.hl_positions && d.hl_positions.length) {
      let posHtml = '<table><tr><th>Coin</th><th>Side</th><th>Size</th><th>Entry</th><th>PnL</th><th>Lev</th></tr>';
      for (const p of d.hl_positions) {
        const pnlClass = p.pnl >= 0 ? 'green' : 'red';
        posHtml += `<tr>
          <td>${p.coin}</td>
          <td>${p.side}</td>
          <td>${p.size}</td>
          <td>$${p.entry}</td>
          <td class="${pnlClass}">${p.pnl >= 0 ? '+' : ''}$${p.pnl.toFixed(2)}</td>
          <td>${p.leverage}x</td>
        </tr>`;
      }
      posHtml += '</table>';
      document.getElementById('positions').innerHTML = posHtml;
    } else {
      document.getElementById('positions').innerHTML = '<div class="card-sub">No open positions</div>';
    }

    // Funding
    if (d.funding_opportunities && d.funding_opportunities.length) {
      let fundHtml = '<table><tr><th>Coin</th><th>Rate/8h</th><th>APR</th><th>Action</th><th>OI</th></tr>';
      for (const f of d.funding_opportunities.slice(0, 8)) {
        const cls = f.apr.startsWith('+') ? 'red' : 'green';
        fundHtml += `<tr>
          <td>${f.coin}</td>
          <td class="${cls}">${f.rate}</td>
          <td class="${cls}">${f.apr}</td>
          <td>${f.action}</td>
          <td>$${f.oi}</td>
        </tr>`;
      }
      fundHtml += '</table>';
      document.getElementById('funding').innerHTML = fundHtml;
    }
    
  } catch(e) {
    console.error('Failed to load data:', e);
  }
}
loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
